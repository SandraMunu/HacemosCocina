<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hacemos cocina · mobile 375</title>
<link rel="stylesheet" href="tokens.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background:
      radial-gradient(60% 60% at 50% 20%, #ECF2F8 0%, #DDE6EF 60%, #C5D2DE 100%);
    font-family: 'Sole Repsol Text', system-ui, sans-serif;
  }
  #root {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    box-sizing: border-box;
  }
  .m-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .m-stage__label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 999px;
    background: rgba(1, 30, 55, 0.06);
    color: var(--color-azul);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .m-stage__dot {
    width: 6px; height: 6px;
    border-radius: 999px;
    background: var(--color-amarillo);
  }
  .m-stage__frame-wrap {
    position: relative;
  }
  .m-stage__iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #fff;
  }
</style>
</head>
<body style="font-size: 8px">
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
  const FRAME_W = 375;
  const FRAME_H = 812;

  function App() {
    const [statusBg, setStatusBg] = React.useState('#ffffff');
    React.useEffect(() => {
      const onMsg = (e) => {
        const data = e.data;
        if (data && data.type === 'm-status-bg') {
          setStatusBg(data.color || '#ffffff');
        }
      };
      window.addEventListener('message', onMsg);
      return () => window.removeEventListener('message', onMsg);
    }, []);

    return (
      <div className="m-stage">
        <span className="m-stage__label">
          <span className="m-stage__dot"></span>
          Hacemos cocina · 375 × 812
        </span>
        <div className="m-stage__frame-wrap">
          <IOSDevice width={FRAME_W} height={FRAME_H}>
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0, height: 54,
              background: statusBg, zIndex: 5,
              transition: 'background 200ms ease',
            }} />
            <iframe
              className="m-stage__iframe"
              src="Hacemos cocina - Home.html?frame=ios"
              title="Hacemos cocina mobile"
              style={{ width: '100%', height: FRAME_H + 'px', flex: '1 1 auto', position: 'relative', zIndex: 1 }}
            />
          </IOSDevice>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
