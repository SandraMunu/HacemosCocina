  var metas = document.querySelectorAll('meta[name="ext-resource-dependency"]');
  for (var i = 0; i < metas.length; i++) {
    var m = metas[i];
    var origPath = m.getAttribute('content');
    var id = m.getAttribute('data-resource-id');
    var url = (window.__resources && window.__resources[id]) || origPath;

  function resolve(v) {
    if (typeof v !== 'string') return v;

    return v;

  var imgProto = HTMLImageElement.prototype;

    if ((name === 'src' || name === 'href' || name === 'xlink:href') && typeof value === 'string') {

  function patchStyle(el) {
    if (!el || !el.style) return;

      });

  }

    for (var i = 0; i < records.length; i++) {

            n.querySelectorAll && n.querySelectorAll('[style*="assets/"]').forEach(patchStyle);
